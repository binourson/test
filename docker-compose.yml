# docker-compose.yml
# This file describes the "services" (containers) we want Docker to run for us.
# Start everything with:  docker compose up -d
# Stop everything with:   docker compose down

services:
  # ── Our MongoDB database ──────────────────────────────────────────
  mongodb:                      # the name we give this service (we choose it)
    image: mongo:7              # which ready-made image to download & run (MongoDB v7)
    container_name: shop-mongo  # a friendly fixed name for the running container
    ports:
      - "27017:27017"           # map port 27017 on YOUR machine -> 27017 inside the container
    volumes:
      - mongo-data:/data/db     # save the DB files in a named volume so data survives restarts
    restart: unless-stopped     # auto-restart the container if it crashes or on reboot

  # ── Our Redis cache ───────────────────────────────────────────────
  redis:
    image: redis:7              # ready-made Redis image (v7)
    container_name: shop-redis
    ports:
      - "6379:6379"             # Redis's default port
    restart: unless-stopped
    # No volume on purpose: cache data is disposable (rebuildable from MongoDB).

  # ── Our backend API (built from ./server/Dockerfile) ──────────────
  backend:
    build: ./server            # build the image from server/Dockerfile
    container_name: shop-backend
    ports:
      - "3000:3000"            # host:container
    environment:
      # Hostnames here are the SERVICE NAMES above, NOT localhost — that's how
      # containers reach each other on the shared compose network.
      - MONGODB_URI=mongodb://mongodb:27017/shop
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=dev_only_change_me_to_a_long_random_string
      - PORT=3000
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  # ── Our frontend (built from ./client/Dockerfile, served by nginx) ─
  frontend:
    build: ./client
    container_name: shop-frontend
    ports:
      - "8080:80"             # visit the app at http://localhost:8080
    depends_on:
      - backend
    restart: unless-stopped

# Named volumes are managed by Docker; this is where MongoDB's data actually lives.
volumes:
  mongo-data:
